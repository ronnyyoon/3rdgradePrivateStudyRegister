    <!-- Early global error handler to safely suppress CORS/sandbox-related false positive errors -->
    <script>
      (function() {
        var suppressErrors = ['Script error.', 'Script error', 'QuotaExceededError', 'SecurityError', 'IndexedDB'];
        window.addEventListener('error', function(event) {
          var msg = event.message || '';
          var errorObj = event.error;
          var shouldSuppress = suppressErrors.some(function(term) {
            return msg.indexOf(term) !== -1 || (errorObj && errorObj.name && errorObj.name.indexOf(term) !== -1);
          });
          if (shouldSuppress || !msg) {
            console.warn('[Sandbox Guard] Suppressed cross-origin / storage exception:', msg, errorObj);
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
        
        window.addEventListener('unhandledrejection', function(event) {
          var reasonStr = event.reason ? String(event.reason) : '';
          var shouldSuppress = suppressErrors.some(function(term) {
            return reasonStr.indexOf(term) !== -1;
          });
          if (shouldSuppress) {
            console.warn('[Sandbox Guard] Suppressed unhandled rejection:', reasonStr);
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
